name: Kolo Native CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/kolo-native-ci.yml"
      - "kolo-native/**"
  pull_request:
    paths:
      - ".github/workflows/kolo-native-ci.yml"
      - "kolo-native/**"

permissions:
  contents: read

jobs:
  android:
    name: Android build, test, and lint
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: kolo-native

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Validate release signing guard
        run: |
          set +e
          KOLO_RELEASE_STORE_FILE=/tmp/missing-release.jks ./gradlew help > ../signing-guard.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Partial release signing config unexpectedly succeeded."
            cat ../signing-guard.log
            exit 1
          fi
          grep -q "Release signing requires KOLO_RELEASE_STORE_FILE" ../signing-guard.log

      - name: Production Gradle gate
        run: ./gradlew testDebugUnitTest lintDebug app:assembleRelease

      - name: Build installable debug APK
        run: ./gradlew app:assembleDebug
